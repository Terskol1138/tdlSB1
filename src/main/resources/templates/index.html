<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ToDo List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; background: white; padding: 50px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 30px; margin: 0 10px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; transition: background 0.3s; }
        .btn:hover { background: #5a67d8; }
        .btn-register { background: #28a745; }
        .btn-register:hover { background: #218838; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 ToDo List Application</h1>
    <p>Manage your tasks efficiently and stay organized</p>
    <a href="/login" class="btn">Login</a>
    <a href="/register" class="btn btn-register">Register</a>
</div>
</body>
</html>
